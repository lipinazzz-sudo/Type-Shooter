<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZType Landing Page</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f172a; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
        }

        #hiddenInput {
            position: absolute; top: -1000px; left: -1000px; opacity: 0;
        }

        /* --- UI OVERLAY --- */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); z-index: 10;
        }

        .menu-box {
            background: #1e293b; padding: 40px; border-radius: 10px;
            border: 2px solid #38bdf8; text-align: center; width: 300px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        h1 { color: #38bdf8; margin-top: 0; font-size: 32px; letter-spacing: 5px;}
        h2 { color: #e2e8f0; font-size: 20px;}
        .mobile-hint { color: #94a3b8; font-size: 12px; margin-top: 15px; }

        button {
            background: #0ea5e9; color: white; border: none;
            padding: 12px 20px; margin: 10px 0; width: 100%;
            font-size: 16px; font-weight: bold; cursor: pointer;
            border-radius: 5px; transition: 0.2s; font-family: inherit;
        }
        button:hover { background: #0284c7; }

        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; text-align: left;
        }
        .setting-row label { font-size: 14px; font-weight: bold; }
        .setting-row input[type="range"] { width: 130px; }
        .setting-row select { width: 130px; padding: 5px; background: #0f172a; color: white; border: 1px solid #38bdf8;}

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

    <canvas id="gameCanvas"></canvas>

    <div id="mainMenu" class="ui-layer">
        <div class="menu-box">
            <h1>Z-TYPE</h1>
            <p>Ketik kata untuk menghancurkan musuh!</p>
            <button onclick="startGame()">PLAY GAME</button>
            <button onclick="openSettings()" style="background: #475569;">SETTINGS</button>
            <p class="mobile-hint">Jika bermain di HP, sentuh layar saat bermain untuk memunculkan keyboard.</p>
        </div>
    </div>

    <div id="settingsMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h2>SETTINGS</h2>
            
            <div class="setting-row">
                <label>Volume SFX</label>
                <input type="range" min="0" max="100" value="80">
            </div>
            
            <div class="setting-row">
                <label>Music</label>
                <input type="range" min="0" max="100" value="50">
            </div>
            
            <div class="setting-row">
                <label>Bahasa</label>
                <select>
                    <option>Indonesia</option>
                    <option>English</option>
                </select>
            </div>

            <button onclick="alert('Fitur Scoreboard sedang dalam pengembangan.')">SCOREBOARD</button>
            
            <button onclick="closeSettings()" style="background: #475569; margin-top: 10px;">KEMBALI</button>
        </div>
    </div>

    <div id="gameOverMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h1 style="color: #ef4444;">GAME OVER</h1>
            <h2 id="finalScoreText">Score: 0</h2>
            <button onclick="startGame()">TRY AGAIN</button>
            <button onclick="openSettings()" style="background: #475569;">SETTINGS</button>
        </div>
    </div>

<script>
    function goToDashboard() {
        window.location.href = 'dashboard.html'; 
    }

    const mainMenu = document.getElementById('mainMenu');
    const settingsMenu = document.getElementById('settingsMenu');
    const gameOverMenu = document.getElementById('gameOverMenu');
    const hiddenInput = document.getElementById('hiddenInput');
    const canvas = document.getElementById('gameCanvas');
    
    function openSettings() {
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        settingsMenu.classList.remove('hidden');
    }
    
    function closeSettings() {
        settingsMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    // --- GAME ENGINE ---
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // PENGATURAN TINGGI KEYBOARD (Ubah angka ini jika posisi kurang pas)
    const keyboardOffset = 335; 

    let wordsList = ["SAYA", "ANAK", "SAPI", "DAN", "BABI", "JUGA", "MAMA", "PAPA", "KOMPUTER", "BELAJAR", "SEKOLAH", "KAMPUS", "TEKNOLOGI", "CERDAS", "SUKSES", "INOVASI", "BACA", "TULIS", "INTERNET", "PROGRAM", "SISTEM", "BUKU"];
    let enemies = [];
    let lasers = [];
    let score = 0;
    let gameActive = false;
    let activeEnemy = null;
    let spawnRate = 160;
    let frameCount = 0;

    // SEKARANG POSISI Y KAPAL BERADA DI ATAS KEYBOARD OFFSET
    const player = { x: canvas.width / 2, y: canvas.height - keyboardOffset, size: 20 };

    class Enemy {
        constructor() {
            this.word = wordsList[Math.floor(Math.random() * wordsList.length)];
            this.typed = "";
            this.x = Math.random() * (canvas.width - 150) + 50;
            this.y = -20;
            this.speed = 0.5 + Math.random() * 0.8;
        }
        draw() {
            ctx.font = "20px 'Courier New'";
            let typedWidth = ctx.measureText(this.typed).width;
            ctx.fillStyle = "#22c55e"; 
            ctx.fillText(this.typed, this.x, this.y);
            ctx.fillStyle = "#ffffff"; 
            ctx.fillText(this.word.substring(this.typed.length), this.x + typedWidth, this.y);
        }
        update() { this.y += this.speed; }
    }

    class Laser {
        constructor(targetX, targetY) {
            this.x = player.x; 
            this.y = player.y; // Tembakan otomatis keluar dari posisi kapal yang baru
            this.targetX = targetX; this.targetY = targetY;
            this.speed = 15;
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x, this.y - 15);
            ctx.strokeStyle = "#38bdf8";
            ctx.lineWidth = 3;
            ctx.stroke();
        }
        update() { this.y -= this.speed; }
    }

    function startGame() {
        enemies = []; lasers = []; score = 0; frameCount = 0; activeEnemy = null;
        gameActive = true;
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        hiddenInput.value = "";
        hiddenInput.focus();
        gameLoop();
    }

    function gameOver() {
        gameActive = false;
        document.getElementById('finalScoreText').innerText = "Score: " + score;
        gameOverMenu.classList.remove('hidden');
        hiddenInput.blur();
    }

    canvas.addEventListener('click', () => {
        if (gameActive) {
            hiddenInput.focus();
        }
    });

    let enterCount = 0;
    let enterTimer = null;

    hiddenInput.addEventListener('keydown', (e) => {
        if (!gameActive) return;

        if (e.key === 'Enter') {
            if (activeEnemy === null) {
                enterCount++;
                if (enterCount === 1) {
                    enterTimer = setTimeout(() => { enterCount = 0; }, 5000);
                }
                if (enterCount >= 5) {
                    clearTimeout(enterTimer);
                    goToDashboard();
                }
            }
        }
    });

    hiddenInput.addEventListener('input', (e) => {
        if (!gameActive) return;
        let val = hiddenInput.value;
        hiddenInput.value = ''; 
        if (val.length === 0) return;

        let key = val.charAt(val.length - 1).toUpperCase();
        enterCount = 0;
        clearTimeout(enterTimer);

        if (!/^[A-Z]$/.test(key)) return;

        if (!activeEnemy) {
            let target = enemies.slice().sort((a,b) => b.y - a.y).find(en => en.word[0] === key);
            if (target) {
                activeEnemy = target;
                activeEnemy.typed += key;
                lasers.push(new Laser(activeEnemy.x, activeEnemy.y));
            }
        } else {
            let nextChar = activeEnemy.word[activeEnemy.typed.length];
            if (key === nextChar) {
                activeEnemy.typed += key;
                lasers.push(new Laser(activeEnemy.x, activeEnemy.y));
                if (activeEnemy.typed === activeEnemy.word) {
                    score += activeEnemy.word.length * 10;
                    enemies = enemies.filter(en => en !== activeEnemy);
                    activeEnemy = null;
                }
            }
        }
    });

    function gameLoop() {
        if (!gameActive) return;
        
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // GARIS PEMBATAS BARU (Opsional - Penanda batas di atas keyboard)
        ctx.strokeStyle = "rgba(71, 85, 105, 0.5)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, player.y + 20);
        ctx.lineTo(canvas.width, player.y + 20);
        ctx.stroke();

        ctx.fillStyle = "#475569";
        ctx.font = "bold 40px Courier New";
        ctx.fillText("SCORE: " + score, 20, 50);

        // KAPAL SEKARANG COCOK DENGAN POSISI BARU
        ctx.fillStyle = "#38bdf8";
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - player.size);
        ctx.lineTo(player.x - player.size, player.y + player.size);
        ctx.lineTo(player.x + player.size, player.y + player.size);
        ctx.fill();

        frameCount++;
        if (frameCount % spawnRate === 0) {
            enemies.push(new Enemy());
            if (spawnRate > 40) spawnRate -= 2;
        }

        lasers.forEach((l, index) => {
            l.update(); l.draw();
            if (l.y < 0) lasers.splice(index, 1);
        });

        enemies.forEach(en => {
            en.update(); en.draw();
            
            // JIKA KATA MELEWATI KAPAL (BATAS KEYBOARD), MAKA GAME OVER
            if (en.y > player.y + 15) {
                gameOver();
            }
        });

        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.x = canvas.width / 2;
        player.y = canvas.height - keyboardOffset; // Kapal tetap di atas keyboard saat resize
    });
</script>
</body>
</html>
