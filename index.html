<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type-Shooter: Far And Beyond</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #070a13; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        
        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
        }

        #hiddenInput {
            position: absolute; top: -1000px; left: -1000px; opacity: 0;
        }

        /* --- UI IN-GAME (TOMBOL PAUSE TRANSPARAN & MINIMALIS) --- */
        .pause-btn {
            position: absolute; top: 25px; right: 30px;
            font-size: 26px; 
            color: rgba(56, 189, 248, 0.35); /* Sangat transparan agar tidak mengganggu */
            cursor: pointer; z-index: 5;
            background: transparent; 
            padding: 5px;
            border: none;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .pause-btn:hover {
            color: rgba(56, 189, 248, 1); /* Menyala terang saat disentuh/di-hover */
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.8);
        }

        /* --- UI OVERLAY --- */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(7, 10, 19, 0.85); z-index: 10;
            backdrop-filter: blur(5px);
        }

        .menu-box {
            background: #0f172a; padding: 40px; border-radius: 12px;
            border: 2px solid #38bdf8; text-align: center; width: 330px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.25);
        }

        h1 { color: #38bdf8; margin-top: 0; margin-bottom: 5px; font-size: 32px; letter-spacing: 5px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        h2 { color: #e2e8f0; font-size: 22px; margin-top: 0; margin-bottom: 20px; letter-spacing: 2px;}
        .mobile-hint { color: #64748b; font-size: 12px; margin-top: 15px; line-height: 1.4; }

        button {
            background: #0ea5e9; color: white; border: none;
            padding: 12px 20px; margin: 8px 0; width: 100%;
            font-size: 15px; font-weight: bold; cursor: pointer;
            border-radius: 6px; transition: 0.2s; font-family: inherit;
            letter-spacing: 1px;
        }
        button:hover { background: #0284c7; transform: translateY(-1px); }

        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; text-align: left;
        }
        .setting-row label { font-size: 14px; font-weight: bold; color: #cbd5e1; }
        .setting-row select { width: 140px; padding: 6px; background: #070a13; color: white; border: 1px solid #38bdf8; border-radius: 4px;}

        .hidden { display: none !important; }

        .score-table {
            width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; text-align: left;
        }
        .score-table th { color: #38bdf8; border-bottom: 2px solid #38bdf8; padding: 8px 4px; }
        .score-table td { padding: 8px 4px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

    <div id="pauseBtn" class="pause-btn hidden" onclick="pauseGame()">⏸</div>

    <canvas id="gameCanvas"></canvas>

    <div id="mainMenu" class="ui-layer">
        <div class="menu-box">
            <h1>TYPE-SHOOTER</h1>
            <p style="color: #38bdf8; font-size: 15px; margin-bottom: 2px; font-weight: bold; letter-spacing: 3px;">FAR AND BEYOND</p>
            <p style="color: #64748b; font-size: 11px; margin-top: 0; margin-bottom: 25px; font-style: italic;">Made With Love</p>
            
            <button onclick="startGame()">PLAY GAME</button>
            <button onclick="openSettings()" style="background: #475569;">SETTINGS</button>
            <button onclick="showScoreboard()" style="background: #10b981;">SCOREBOARD</button>
            <p class="mobile-hint">Sentuh layar saat bermain untuk memunculkan keyboard virtual.</p>
        </div>
    </div>

    <div id="settingsMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h2>SETTINGS</h2>
            <div class="setting-row">
                <label>Suara SFX</label>
                <select id="sfxSelect" onchange="saveOptions()">
                    <option value="on">Aktif (On)</option>
                    <option value="off">Mute (Off)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Bahasa</label>
                <select id="langSelect" onchange="saveOptions()">
                    <option value="id">Indonesia</option>
                    <option value="en">English</option>
                </select>
            </div>
            <button onclick="closeSettings()" style="background: #475569; margin-top: 10px;">KEMBALI</button>
        </div>
    </div>

    <div id="pauseMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h2 style="color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);">GAME PAUSED</h2>
            
            <div class="setting-row" style="margin-top: 20px;">
                <label>Suara SFX</label>
                <select id="pauseSfxSelect" onchange="syncOptions('pause')">
                    <option value="on">Aktif (On)</option>
                    <option value="off">Mute (Off)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Bahasa</label>
                <select id="pauseLangSelect" onchange="syncOptions('pause')">
                    <option value="id">Indonesia</option>
                    <option value="en">English</option>
                </select>
            </div>

            <button onclick="resumeGame()" style="background: #0ea5e9; margin-top: 15px;">RESUME</button>
            <button onclick="exitToMenu()" style="background: #ef4444;">MENU UTAMA</button>
        </div>
    </div>

    <div id="scoreboardMenu" class="ui-layer hidden">
        <div class="menu-box" style="width: 380px;">
            <h2>TOP 5 HIGH SCORES</h2>
            <div id="scoreboardContent"></div>
            <button onclick="closeScoreboard()" style="background: #475569; margin-top: 10px;">KEMBALI</button>
        </div>
    </div>

    <div id="gameOverMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h1 style="color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);">GAME OVER</h1>
            <h2 id="finalScoreText" style="margin-bottom: 5px;">Score: 0</h2>
            <p id="finalWaveText" style="color: #94a3b8; font-size: 14px; margin-top: 0; margin-bottom: 20px;">Reached: Wave 1</p>
            
            <button onclick="startGame()">TRY AGAIN</button>
            <button onclick="showScoreboard()" style="background: #10b981;">SCOREBOARD</button>
            <button onclick="openMenuUtama()" style="background: #475569;">MENU UTAMA</button>
        </div>
    </div>

<script>
    function goToDashboard() {
        window.location.href = 'dashboard.html'; 
    }

    const mainMenu = document.getElementById('mainMenu');
    const settingsMenu = document.getElementById('settingsMenu');
    const pauseMenu = document.getElementById('pauseMenu');
    const scoreboardMenu = document.getElementById('scoreboardMenu');
    const gameOverMenu = document.getElementById('gameOverMenu');
    const pauseBtn = document.getElementById('pauseBtn');
    const hiddenInput = document.getElementById('hiddenInput');
    const canvas = document.getElementById('gameCanvas');
    
    let sfxSetting = localStorage.getItem('sfxSetting') || 'on';
    let langSetting = localStorage.getItem('langSetting') || 'id';

    document.getElementById('sfxSelect').value = sfxSetting;
    document.getElementById('langSelect').value = langSetting;
    document.getElementById('pauseSfxSelect').value = sfxSetting;
    document.getElementById('pauseLangSelect').value = langSetting;

    function saveOptions() {
        sfxSetting = document.getElementById('sfxSelect').value;
        langSetting = document.getElementById('langSelect').value;
        localStorage.setItem('sfxSetting', sfxSetting);
        localStorage.setItem('langSetting', langSetting);
        document.getElementById('pauseSfxSelect').value = sfxSetting;
        document.getElementById('pauseLangSelect').value = langSetting;
    }

    function syncOptions(source) {
        if(source === 'pause') {
            sfxSetting = document.getElementById('pauseSfxSelect').value;
            langSetting = document.getElementById('pauseLangSelect').value;
        }
        localStorage.setItem('sfxSetting', sfxSetting);
        localStorage.setItem('langSetting', langSetting);
        document.getElementById('sfxSelect').value = sfxSetting;
        document.getElementById('langSelect').value = langSetting;
    }

    function openSettings() {
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        settingsMenu.classList.remove('hidden');
    }
    
    function closeSettings() {
        settingsMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    function openMenuUtama() {
        gameOverMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    function pauseGame() {
        if (!gameActive) return;
        gameActive = false; 
        pauseBtn.classList.add('hidden');
        pauseMenu.classList.remove('hidden');
        hiddenInput.blur();
    }

    function resumeGame() {
        pauseMenu.classList.add('hidden');
        pauseBtn.classList.remove('hidden');
        gameActive = true;
        hiddenInput.focus();
        gameLoop(); 
    }

    function exitToMenu() {
        pauseMenu.classList.add('hidden');
        pauseBtn.classList.add('hidden');
        mainMenu.classList.remove('hidden');
        enemies = []; lasers = []; particles = []; activeEnemy = null;
    }

    // --- GAME ENGINE ---
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const wordsList = [
        "AMAS", "DESA", "KOTA", "GAIA", "MAIN", "SAYA", "ANAK", "MAMA", "PAPA", "BUKU", "MALL", "IPAD",
        "RUMAH", "SAPI", "BABI", "PULSA", "ROKET", "ASTRO", "CYBER", "LASER", "PIXEL", "SPACE", "CLOUD",
        "SIANTAN", "PONTIANAK", "KALIMANTAN", "SINGKAWANG", "SEKOLAH", "SUKSES", "LANDAK", "DESKAP", "AYANI", 
        "KWECAP", "BUBUR", "CHOIPAN", "KOSMOS", "NEBULA", "METEOR", "GALAXY", "ORBITAL", "PLASMA", "MATRIX",
        "SATELIT", "KAPSUL", "GRAVITY", "ANDROID", "STELLAR", "QUANTUM", "SHUTTLE", "HORIZON", "ECLIPSE",
        "COMPILER", "DATABASE", "INTERNET", "PROTOCOL", "FIREWALL", "TERMINAL", "FUTURISTIC", "CYBERPUNK",
        "CEHUNTIAU", "ASTEROID", "SUPERNOVA", "TELEPORT", "WARPDRIVE", "BLACKHOLE", "STARSHIP", "ASTRONAUT"
    ];

    let enemies = [];
    let lasers = [];
    let particles = [];
    let stars = [];
    let score = 0;
    let gameActive = false;
    let activeEnemy = null;
    let frameCount = 0;

    let currentWave = 1;
    let enemiesLeftToSpawn = 0;
    let waveSpawnTimer = 0;
    let waveClearMessageTimer = 0;

    let shakeTimer = 0;
    let shakeIntensity = 0;

    function triggerScreenShake(intensity, duration) {
        shakeIntensity = intensity;
        shakeTimer = duration;
    }

    const player = { x: canvas.width / 2, y: canvas.height - 100, size: 25 };
    let kodeAngka = ""; 
    const PIN_RAHASIA = "0189"; 

    function updatePlayerPosition() {
        player.x = canvas.width / 2;
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isPortrait = canvas.height > canvas.width;

        if (isTouchDevice && isPortrait) {
            player.y = canvas.height - 340; 
        } else if (isTouchDevice && !isPortrait) {
            player.y = canvas.height - 220;
        } else {
            player.y = canvas.height - 80;
        }
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 70; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: 0.3 + Math.random() * 1.2
            });
        }
    }

    class Enemy {
        constructor(waveNum) {
            ctx.font = "bold 20px 'Courier New'";
            
            let minLen = waveNum <= 2 ? 4 : (waveNum <= 5 ? 5 : 6);
            let maxLen = waveNum <= 2 ? 6 : (waveNum <= 5 ? 8 : 12);
            
            let possibleWords = wordsList.filter(w => w.length >= minLen && w.length <= maxLen);
            if (possibleWords.length === 0) possibleWords = wordsList;

            let currentFirstLetters = enemies.map(e => e.word[0]);
            let filteredList = possibleWords.filter(w => !currentFirstLetters.includes(w[0]));
            if (filteredList.length === 0) filteredList = possibleWords;

            this.word = filteredList[Math.floor(Math.random() * filteredList.length)];
            this.typed = "";
            this.wordWidth = ctx.measureText(this.word).width;
            
            let maxSpawnX = canvas.width - this.wordWidth - 40;
            this.x = Math.random() * (maxSpawnX - 30) + 30;
            if (this.x < 30) this.x = 30;

            this.y = -30;
            this.speed = 0.4 + (Math.random() * 0.3) + (Math.min(waveNum, 10) * 0.05);
        }
        draw() {
            ctx.font = "bold 20px 'Courier New'"; 
            let typedWidth = ctx.measureText(this.typed).width;

            if (activeEnemy === this) {
                ctx.strokeStyle = "rgba(56, 189, 248, 0.4)";
                ctx.lineWidth = 1.5;
                ctx.strokeRect(this.x - 10, this.y - 20, this.wordWidth + 20, 26);
                
                ctx.fillStyle = "#38bdf8";
                ctx.fillRect(this.x - 12, this.y - 22, 6, 2);
                ctx.fillRect(this.x - 12, this.y - 22, 2, 6);
                ctx.fillRect(this.x + this.wordWidth + 6, this.y - 22, 6, 2);
                ctx.fillRect(this.x + this.wordWidth + 10, this.y - 22, 2, 6);
            }

            ctx.fillStyle = "#4ade80"; 
            ctx.shadowBlur = activeEnemy === this ? 12 : 4;       
            ctx.shadowColor = "#22c55e"; 
            ctx.fillText(this.typed, this.x, this.y);

            ctx.shadowBlur = 0; 
            ctx.fillStyle = "#ffffff"; 
            ctx.fillText(this.word.substring(this.typed.length), this.x + typedWidth, this.y);
        }
        update() { this.y += this.speed; }
    }

    class Laser {
        constructor(targetX, targetY) {
            this.x = player.x; 
            this.y = player.y - (player.size * 1.2); 
            this.speed = 32; 

            let dx = targetX - this.x;
            let dy = targetY - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            this.vx = (dx / distance) * this.speed;
            this.vy = (dy / distance) * this.speed;
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - (this.vx * 0.5), this.y - (this.vy * 0.5));
            ctx.strokeStyle = "#38bdf8"; 
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#0ea5e9";
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        update() { 
            this.x += this.vx; 
            this.y += this.vy; 
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 3.5 + 1.5;
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 4.5 + 1;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.alpha = 1;
            this.decay = Math.random() * 0.035 + 0.015;
            const colors = ["#4ade80", "#38bdf8", "#bae6fd", "#ffffff"];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.restore();
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.alpha -= this.decay;
        }
    }

    function createExplosion(x, y, wordLength) {
        let count = 12 + wordLength * 3;
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x + (Math.random() * wordLength * 9), y - 4));
        }
    }

    function startWave(waveNum) {
        currentWave = waveNum;
        enemiesLeftToSpawn = 4 + waveNum * 2; 
        waveSpawnTimer = 0;
        waveClearMessageTimer = 90; 
    }

    hiddenInput.addEventListener('input', (e) => {
        if (!gameActive) return;
        let val = hiddenInput.value;
        hiddenInput.value = ''; 
        if (val.length === 0) return;

        for (let i = 0; i < val.length; i++) {
            let karakter = val.charAt(i);

            if (/^[0-9]$/.test(karakter)) {
                kodeAngka += karakter;
                if (kodeAngka.length > PIN_RAHASIA.length) {
                    kodeAngka = kodeAngka.slice(-PIN_RAHASIA.length);
                }
                if (kodeAngka === PIN_RAHASIA) {
                    goToDashboard();
                    return; 
                }
                continue; 
            }

            let key = karakter.toUpperCase();
            if (!/^[A-Z]$/.test(key)) continue;

            ctx.font = "bold 20px 'Courier New'"; 

            if (!activeEnemy) {
                let targets = enemies.filter(en => en.word[0] === key);
                if (targets.length > 0) {
                    targets.sort((a, b) => b.y - a.y); 
                    activeEnemy = targets[0]; 
                    activeEnemy.typed += key;
                    
                    let targetX = activeEnemy.x + ctx.measureText(activeEnemy.typed).width - 6;
                    lasers.push(new Laser(targetX, activeEnemy.y));
                }
            } else {
                let nextChar = activeEnemy.word[activeEnemy.typed.length];
                if (key === nextChar) {
                    activeEnemy.typed += key;
                    
                    let targetX = activeEnemy.x + ctx.measureText(activeEnemy.typed).width - 6;
                    lasers.push(new Laser(targetX, activeEnemy.y));
                    
                    if (activeEnemy.typed === activeEnemy.word) {
                        score += activeEnemy.word.length * 10;
                        triggerScreenShake(5, 8); 
                        createExplosion(activeEnemy.x, activeEnemy.y, activeEnemy.word.length);
                        enemies = enemies.filter(en => en !== activeEnemy);
                        activeEnemy = null;
                    }
                }
            }
        }
    });

    function saveHighScore(finalScore, finalWave) {
        let scores = JSON.parse(localStorage.getItem('typeShooterScores')) || [];
        scores.push({ 
            score: finalScore, 
            wave: finalWave,
            date: new Date().toLocaleDateString('id-ID') 
        });
        scores.sort((a, b) => b.score - a.score);
        scores = scores.slice(0, 5); 
        localStorage.setItem('typeShooterScores', JSON.stringify(scores));
    }

    function showScoreboard() {
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        scoreboardMenu.classList.remove('hidden');

        let scores = JSON.parse(localStorage.getItem('typeShooterScores')) || [];
        let contentDiv = document.getElementById('scoreboardContent');

        if(scores.length === 0) {
            contentDiv.innerHTML = "<p style='color:#64748b; margin: 20px 0;'>Belum ada rekor skor.</p>";
        } else {
            let tableHTML = "<table class='score-table'><tr><th>Rank</th><th>Skor</th><th>Wave</th><th>Tanggal</th></tr>";
            scores.forEach((item, index) => {
                let waveDisplay = item.wave ? "W-" + item.wave : "W-1";
                tableHTML += `<tr>
                    <td>#${index + 1}</td>
                    <td style="color:#4ade80; font-weight:bold;">${item.score}</td>
                    <td style="color:#38bdf8; font-weight:bold;">${waveDisplay}</td>
                    <td style="color:#64748b; font-size:12px;">${item.date}</td>
                </tr>`;
            });
            tableHTML += "</table>";
            contentDiv.innerHTML = tableHTML;
        }
    }

    function closeScoreboard() {
        scoreboardMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    function startGame() {
        enemies = []; lasers = []; particles = []; kodeAngka = ""; score = 0; frameCount = 0; activeEnemy = null;
        shakeTimer = 0;
        startWave(1);
        updatePlayerPosition();
        initStars();
        gameActive = true;
        
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        pauseMenu.classList.add('hidden');
        pauseBtn.classList.remove('hidden'); 
        
        hiddenInput.value = "";
        hiddenInput.focus();
        
        gameLoop();
    }

    function gameOver() {
        gameActive = false;
        pauseBtn.classList.add('hidden'); 
        triggerScreenShake(14, 25);
        
        saveHighScore(score, currentWave); 
        
        document.getElementById('finalScoreText').innerText = "Score: " + score;
        document.getElementById('finalWaveText').innerText = "Reached: Wave " + currentWave;
        
        gameOverMenu.classList.remove('hidden');
        hiddenInput.blur();
    }

    canvas.addEventListener('click', () => {
        if (gameActive) {
            hiddenInput.focus();
        }
    });

    function gameLoop() {
        if (!gameActive) return;
        
        ctx.fillStyle = "#070a13";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        if (shakeTimer > 0) {
            ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
            shakeTimer--;
        }

        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        stars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size);
            star.y += star.speed;
            if (star.y > canvas.height) {
                star.y = 0; star.x = Math.random() * canvas.width;
            }
        });

        ctx.strokeStyle = "rgba(239, 68, 68, 0.3)"; 
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, player.y + 35); ctx.lineTo(canvas.width, player.y + 35); ctx.stroke();

        ctx.fillStyle = "rgba(148, 163, 184, 0.15)";
        ctx.font = "bold 24px 'Courier New'";
        ctx.fillText("WAVE: " + currentWave, 25, 45);
        ctx.fillText("SCORE: " + score, 25, 80);

        if (enemiesLeftToSpawn > 0 && waveClearMessageTimer <= 0) {
            waveSpawnTimer++;
            let spawnInterval = Math.max(90 - currentWave * 4, 50); 
            if (waveSpawnTimer >= spawnInterval) {
                enemies.push(new Enemy(currentWave));
                enemiesLeftToSpawn--;
                waveSpawnTimer = 0;
            }
        } else if (enemies.length === 0 && enemiesLeftToSpawn === 0 && waveClearMessageTimer <= 0) {
            startWave(currentWave + 1);
        }

        if (waveClearMessageTimer > 0) {
            waveClearMessageTimer--;
            ctx.fillStyle = "#38bdf8";
            ctx.font = "bold 32px 'Courier New'";
            ctx.textAlign = "center";
            ctx.shadowBlur = 10; ctx.shadowColor = "#38bdf8";
            ctx.fillText("INCOMING WAVE " + currentWave, canvas.width / 2, canvas.height / 2.5);
            ctx.shadowBlur = 0; ctx.textAlign = "left"; 
        }

        let cx = player.x; let cy = player.y; let s = player.size;
        let thrustGlow = 12 + Math.random() * 12; 
        
        ctx.fillStyle = "#f97316"; ctx.shadowBlur = thrustGlow; ctx.shadowColor = "#ef4444";
        ctx.beginPath(); ctx.moveTo(cx - 5, cy + s - 5); ctx.lineTo(cx + 5, cy + s - 5); ctx.lineTo(cx, cy + s + (thrustGlow * 0.8)); ctx.fill();
        ctx.fillStyle = "#fef08a"; 
        ctx.beginPath(); ctx.moveTo(cx - 2, cy + s - 5); ctx.lineTo(cx + 2, cy + s - 5); ctx.lineTo(cx, cy + s + (thrustGlow * 0.35)); ctx.fill();
        ctx.shadowBlur = 0; 

        ctx.fillStyle = "#1e293b";
        ctx.beginPath(); ctx.moveTo(cx, cy - s*0.2); ctx.lineTo(cx - s*1.4, cy + s); ctx.lineTo(cx + s*1.4, cy + s); ctx.fill();
        ctx.fillStyle = "#475569";
        ctx.beginPath(); ctx.moveTo(cx, cy - s*1.3); ctx.lineTo(cx - s*0.8, cy + s - 5); ctx.lineTo(cx, cy + s - 10); ctx.lineTo(cx + s*0.8, cy + s - 5); ctx.fill();
        ctx.fillStyle = "#0ea5e9";
        ctx.beginPath(); ctx.moveTo(cx - s*1.4, cy + s); ctx.lineTo(cx - s*1.1, cy + s*0.5); ctx.lineTo(cx - s*0.8, cy + s - 5); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx + s*1.4, cy + s); ctx.lineTo(cx + s*1.1, cy + s*0.5); ctx.lineTo(cx + s*0.8, cy + s - 5); ctx.fill();
        ctx.fillStyle = "#bae6fd";
        ctx.beginPath(); ctx.ellipse(cx, cy - s*0.2, s*0.25, s*0.5, 0, 0, Math.PI * 2); ctx.fill();

        particles.forEach((p, index) => {
            p.update(); p.draw();
            if (p.alpha <= 0) particles.splice(index, 1);
        });

        lasers.forEach((l, index) => {
            l.update(); l.draw();
            if (l.y < -50 || l.x < -50 || l.x > canvas.width + 50) lasers.splice(index, 1);
        });

        enemies.forEach(en => {
            en.update(); en.draw();
            if (en.y > player.y + 15) { gameOver(); }
        });

        ctx.restore(); 
        frameCount++;
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        updatePlayerPosition(); initStars(); 
    });
    
    updatePlayerPosition();
</script>
</body>
</html>
