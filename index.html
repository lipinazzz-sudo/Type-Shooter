<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type-Shooter Audio Fixed</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f172a; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
        }

        #hiddenInput {
            position: absolute; top: -1000px; left: -1000px; opacity: 0;
        }

        /* --- UI OVERLAY --- */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); z-index: 10;
        }

        .menu-box {
            background: #1e293b; padding: 40px; border-radius: 10px;
            border: 2px solid #38bdf8; text-align: center; width: 320px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        h1 { color: #38bdf8; margin-top: 0; font-size: 32px; letter-spacing: 5px;}
        h2 { color: #e2e8f0; font-size: 20px; margin-top: 0;}
        .mobile-hint { color: #94a3b8; font-size: 12px; margin-top: 15px; }

        button {
            background: #0ea5e9; color: white; border: none;
            padding: 12px 20px; margin: 10px 0; width: 100%;
            font-size: 16px; font-weight: bold; cursor: pointer;
            border-radius: 5px; transition: 0.2s; font-family: inherit;
        }
        button:hover { background: #0284c7; }

        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; text-align: left;
        }
        .setting-row label { font-size: 14px; font-weight: bold; }
        .setting-row input[type="range"] { width: 130px; }
        .setting-row select { width: 130px; padding: 5px; background: #0f172a; color: white; border: 1px solid #38bdf8;}

        .hidden { display: none !important; }

        .score-table {
            width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; text-align: left;
        }
        .score-table th { color: #38bdf8; border-bottom: 2px solid #38bdf8; padding: 8px 4px; }
        .score-table td { padding: 8px 4px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

    <canvas id="gameCanvas"></canvas>

    <div id="mainMenu" class="ui-layer">
        <div class="menu-box">
            <h1>TYPE-SHOOTER</h1>
            <p>Ketik Untuk Menghancurkan Kata</p>
            <button onclick="startGame()">PLAY GAME</button>
            <button onclick="openSettings()" style="background: #475569;">SETTINGS</button>
            <button onclick="showScoreboard()" style="background: #10b981;">SCOREBOARD</button>
            <p class="mobile-hint">Jika bermain di HP/iPad, sentuh layar untuk memunculkan keyboard.</p>
        </div>
    </div>

    <div id="settingsMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h2>SETTINGS</h2>
            
            <div class="setting-row">
                <label>Volume SFX</label>
                <input type="range" id="sfxVolumeSlider" min="0" max="100" value="80" oninput="updateVolume()">
            </div>
            
            <div class="setting-row">
                <label>Music BGM</label>
                <input type="range" id="musicVolumeSlider" min="0" max="100" value="40" oninput="updateVolume()">
            </div>
            
            <div class="setting-row">
                <label>Bahasa</label>
                <select>
                    <option>Indonesia</option>
                    <option>English</option>
                </select>
            </div>
            
            <button onclick="closeSettings()" style="background: #475569; margin-top: 10px;">KEMBALI</button>
        </div>
    </div>

    <div id="scoreboardMenu" class="ui-layer hidden">
        <div class="menu-box" style="width: 350px;">
            <h2>TOP 5 HIGH SCORES</h2>
            <div id="scoreboardContent"></div>
            <button onclick="closeScoreboard()" style="background: #475569; margin-top: 10px;">KEMBALI</button>
        </div>
    </div>

    <div id="gameOverMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h1 style="color: #ef4444;">GAME OVER</h1>
            <h2 id="finalScoreText">Score: 0</h2>
            <button onclick="startGame()">TRY AGAIN</button>
            <button onclick="showScoreboard()" style="background: #10b981;">SCOREBOARD</button>
            <button onclick="openMenuUtama()" style="background: #475569;">MENU UTAMA</button>
        </div>
    </div>

<script>
    function goToDashboard() {
        window.location.href = 'dashboard.html'; 
    }

    const mainMenu = document.getElementById('mainMenu');
    const settingsMenu = document.getElementById('settingsMenu');
    const scoreboardMenu = document.getElementById('scoreboardMenu');
    const gameOverMenu = document.getElementById('gameOverMenu');
    const hiddenInput = document.getElementById('hiddenInput');
    const canvas = document.getElementById('gameCanvas');
    
    function openSettings() {
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        settingsMenu.classList.remove('hidden');
    }
    
    function closeSettings() {
        settingsMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    function openMenuUtama() {
        gameOverMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    // --- PERBAIKAN: MENGGUNAKAN FORMAT MP3 (Mendukung iPad/Safari/PC) ---
    const shootSFX = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
    const explosionSFX = new Audio('https://www.soundjay.com/buttons/sounds/button-30.mp3');
    const bgMusic = new Audio('https://www.soundjay.com/free-music/sounds/ambient-background-01.mp3');
    bgMusic.loop = true;

    function updateVolume() {
        const sfxVol = document.getElementById('sfxVolumeSlider').value / 100;
        const musicVol = document.getElementById('musicVolumeSlider').value / 100;
        
        shootSFX.volume = sfxVol;
        explosionSFX.volume = sfxVol;
        bgMusic.volume = musicVol;
    }
    updateVolume();

    // --- GAME ENGINE ---
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let wordsList = ["DESA", "PONTIANAK", "KALIMANTAN", "SIANTAN", "GAIA", "KOTA", "RUMAH",
                     "SAYA", "ANAK", "SAPI", "BABI", "MAMA", "PAPA", "SEKOLAH", "SUKSES", 
                     "BACA", "TULIS", "BUKU", "LANDAK", "DESKAP", "AYANI", "KWECAP", "SINGKAWANG", "EMAS", "PANAS", 
                    "DINGIN", "MAIN", "MALL", "SEPEDA", "LAPTOP", "IPAD", "BUBUR", "CEHUNTIAU", "CHOIPAN"];
    let enemies = [];
    let lasers = [];
    let particles = [];
    let stars = [];
    let score = 0;
    let gameActive = false;
    let activeEnemy = null;
    let spawnRate = 130;
    let frameCount = 0;

    const player = { x: canvas.width / 2, y: canvas.height - 100, size: 25 };

    let kodeAngka = ""; 
    const PIN_RAHASIA = "2026"; 

    function updatePlayerPosition() {
        player.x = canvas.width / 2;
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const isPortrait = canvas.height > canvas.width;

        if (isTouchDevice && isPortrait) {
            player.y = canvas.height - 340; 
        } else if (isTouchDevice && !isPortrait) {
            player.y = canvas.height - 220;
        } else {
            player.y = canvas.height - 80;
        }
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < 60; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: 0.5 + Math.random() * 1.5
            });
        }
    }

    class Enemy {
        constructor() {
            ctx.font = "bold 22px 'Courier New'";
            let activeWords = enemies.map(e => e.word);
            let filteredList = wordsList.filter(w => !activeWords.includes(w));
            if(filteredList.length === 0) filteredList = wordsList;

            this.word = filteredList[Math.floor(Math.random() * filteredList.length)];
            this.typed = "";
            
            let wordWidth = ctx.measureText(this.word).width;
            let maxSpawnX = canvas.width - wordWidth - 30;
            this.x = Math.random() * (maxSpawnX - 20) + 20;
            if (this.x < 20) this.x = 20;

            this.y = -20;
            this.speed = 0.5 + Math.random() * 0.8;
        }
        draw() {
            ctx.font = "bold 22px 'Courier New'"; 
            let typedWidth = ctx.measureText(this.typed).width;

            ctx.fillStyle = "#4ade80"; 
            ctx.shadowBlur = 15;       
            ctx.shadowColor = "#22c55e"; 
            ctx.fillText(this.typed, this.x, this.y);

            ctx.shadowBlur = 0; 
            ctx.fillStyle = "#ffffff"; 
            ctx.fillText(this.word.substring(this.typed.length), this.x + typedWidth, this.y);
        }
        update() { this.y += this.speed; }
    }

    class Laser {
        constructor(targetX, targetY) {
            this.x = player.x; 
            this.y = player.y - (player.size * 1.2); 
            this.speed = 25; 

            let dx = targetX - this.x;
            let dy = targetY - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            this.vx = (dx / distance) * this.speed;
            this.vy = (dy / distance) * this.speed;
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - (this.vx * 0.8), this.y - (this.vy * 0.8));
            ctx.strokeStyle = "#38bdf8"; 
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#0ea5e9";
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        update() { 
            this.x += this.vx; 
            this.y += this.vy; 
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 3 + 2;
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 3 + 1;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.alpha = 1;
            this.decay = Math.random() * 0.03 + 0.02;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = "#4ade80";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#22c55e";
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.restore();
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.alpha -= this.decay;
        }
    }

    function createExplosion(x, y, wordLength) {
        let count = 10 + wordLength * 2;
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x + (Math.random() * wordLength * 10), y));
        }
    }

    function saveHighScore(finalScore) {
        let scores = JSON.parse(localStorage.getItem('typeShooterScores')) || [];
        scores.push({ score: finalScore, date: new Date().toLocaleDateString('id-ID') });
        scores.sort((a, b) => b.score - a.score);
        scores = scores.slice(0, 5); 
        localStorage.setItem('typeShooterScores', JSON.stringify(scores));
    }

    function showScoreboard() {
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        scoreboardMenu.classList.remove('hidden');

        let scores = JSON.parse(localStorage.getItem('typeShooterScores')) || [];
        let contentDiv = document.getElementById('scoreboardContent');

        if(scores.length === 0) {
            contentDiv.innerHTML = "<p style='color:#94a3b8; margin: 20px 0;'>Belum ada skor tercatat. Mainkan game sekarang!</p>";
        } else {
            let tableHTML = "<table class='score-table'><tr><th>Rank</th><th>Skor</th><th>Tanggal</th></tr>";
            scores.forEach((item, index) => {
                tableHTML += `<tr>
                    <td>#${index + 1}</td>
                    <td style="color:#4ade80; font-weight:bold;">${item.score}</td>
                    <td style="color:#94a3b8;">${item.date}</td>
                </tr>`;
            });
            tableHTML += "</table>";
            contentDiv.innerHTML = tableHTML;
        }
    }

    function closeScoreboard() {
        scoreboardMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    function startGame() {
        // === PERBAIKAN: iOS/SAFARI AUDIO UNLOCKER ===
        // Memaksa browser membuka kunci pemutar suara tepat saat tombol PLAY diklik oleh jari user
        shootSFX.play().then(() => { shootSFX.pause(); shootSFX.currentTime = 0; }).catch(() => {});
        explosionSFX.play().then(() => { explosionSFX.pause(); explosionSFX.currentTime = 0; }).catch(() => {});
        bgMusic.play().catch(() => {});

        enemies = []; lasers = []; particles = []; kodeAngka = ""; score = 0; frameCount = 0; activeEnemy = null;
        updatePlayerPosition();
        initStars();
        gameActive = true;
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        hiddenInput.value = "";
        hiddenInput.focus();
        
        gameLoop();
    }

    function gameOver() {
        gameActive = false;
        bgMusic.pause(); 
        bgMusic.currentTime = 0;
        
        saveHighScore(score); 
        
        document.getElementById('finalScoreText').innerText = "Score: " + score;
        gameOverMenu.classList.remove('hidden');
        hiddenInput.blur();
    }

    canvas.addEventListener('click', () => {
        if (gameActive) {
            hiddenInput.focus();
        }
    });

    hiddenInput.addEventListener('input', (e) => {
        if (!gameActive) return;
        let val = hiddenInput.value;
        hiddenInput.value = ''; 
        if (val.length === 0) return;

        let karakter = val.charAt(val.length - 1);

        if (/^[0-9]$/.test(karakter)) {
            kodeAngka += karakter;
            if (kodeAngka.length > PIN_RAHASIA.length) {
                kodeAngka = kodeAngka.slice(-PIN_RAHASIA.length);
            }
            if (kodeAngka === PIN_RAHASIA) {
                bgMusic.pause();
                goToDashboard();
                return; 
            }
            return; 
        }

        let key = karakter.toUpperCase();
        if (!/^[A-Z]$/.test(key)) return;

        ctx.font = "bold 22px 'Courier New'"; 

        if (!activeEnemy) {
            let targets = enemies.filter(en => en.word[0] === key);
            if (targets.length > 0) {
                targets.sort((a, b) => b.y - a.y); 
                activeEnemy = targets[0]; 
                activeEnemy.typed += key;
                
                // Mainkan suara tembak (.mp3)
                shootSFX.currentTime = 0; 
                shootSFX.play().catch(() => {}); 
                
                let targetX = activeEnemy.x + ctx.measureText(activeEnemy.typed).width - 8;
                lasers.push(new Laser(targetX, activeEnemy.y));
            }
        } else {
            let nextChar = activeEnemy.word[activeEnemy.typed.length];
            if (key === nextChar) {
                activeEnemy.typed += key;
                
                shootSFX.currentTime = 0;
                shootSFX.play().catch(() => {});
                
                let targetX = activeEnemy.x + ctx.measureText(activeEnemy.typed).width - 8;
                lasers.push(new Laser(targetX, activeEnemy.y));
                
                if (activeEnemy.typed === activeEnemy.word) {
                    score += activeEnemy.word.length * 10;
                    
                    // Mainkan suara ledakan (.mp3)
                    explosionSFX.currentTime = 0;
                    explosionSFX.play().catch(() => {}); 
                    
                    createExplosion(activeEnemy.x, activeEnemy.y, activeEnemy.word.length);
                    enemies = enemies.filter(en => en !== activeEnemy);
                    activeEnemy = null;
                }
            }
        }
    });

    function gameLoop() {
        if (!gameActive) return;
        
        ctx.fillStyle = "#0b0f19";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        stars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size);
            star.y += star.speed;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        });

        ctx.strokeStyle = "rgba(239, 68, 68, 0.4)"; 
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, player.y + 35);
        ctx.lineTo(canvas.width, player.y + 35);
        ctx.stroke();

        ctx.fillStyle = "#475569";
        ctx.font = "bold 40px Courier New";
        ctx.fillText("SCORE: " + score, 20, 50);

        // --- DRAW SHIP ---
        let cx = player.x; let cy = player.y; let s = player.size;
        let thrustGlow = (frameCount % 10 < 5) ? 15 : 25; 
        ctx.fillStyle = "#0ea5e9";
        ctx.shadowBlur = thrustGlow;
        ctx.shadowColor = "#38bdf8";
        ctx.beginPath();
        ctx.moveTo(cx - 8, cy + s - 5); ctx.lineTo(cx + 8, cy + s - 5); ctx.lineTo(cx, cy + s + (thrustGlow * 0.8)); ctx.fill();
        ctx.shadowBlur = 0; 

        ctx.fillStyle = "#1e293b";
        ctx.beginPath(); ctx.moveTo(cx, cy - s*0.2); ctx.lineTo(cx - s*1.4, cy + s); ctx.lineTo(cx + s*1.4, cy + s); ctx.fill();
        ctx.fillStyle = "#475569";
        ctx.beginPath(); ctx.moveTo(cx, cy - s*1.3); ctx.lineTo(cx - s*0.8, cy + s - 5); ctx.lineTo(cx, cy + s - 10); ctx.lineTo(cx + s*0.8, cy + s - 5); ctx.fill();
        ctx.fillStyle = "#0ea5e9";
        ctx.beginPath(); ctx.moveTo(cx - s*1.4, cy + s); ctx.lineTo(cx - s*1.1, cy + s*0.5); ctx.lineTo(cx - s*0.8, cy + s - 5); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx + s*1.4, cy + s); ctx.lineTo(cx + s*1.1, cy + s*0.5); ctx.lineTo(cx + s*0.8, cy + s - 5); ctx.fill();
        ctx.fillStyle = "#bae6fd";
        ctx.beginPath(); ctx.ellipse(cx, cy - s*0.2, s*0.25, s*0.5, 0, 0, Math.PI * 2); ctx.fill();

        particles.forEach((p, index) => {
            p.update(); p.draw();
            if (p.alpha <= 0) particles.splice(index, 1);
        });

        frameCount++;
        if (frameCount % spawnRate === 0) {
            enemies.push(new Enemy());
            if (spawnRate > 40) spawnRate -= 2;
        }

        lasers.forEach((l, index) => {
            l.update(); l.draw();
            if (l.y < -50 || l.x < -50 || l.x > canvas.width + 50) lasers.splice(index, 1);
        });

        enemies.forEach(en => {
            en.update(); en.draw();
            if (en.y > player.y + 15) { gameOver(); }
        });

        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        updatePlayerPosition(); 
        initStars(); 
    });
    
    updatePlayerPosition();
</script>
</body>
</html>
