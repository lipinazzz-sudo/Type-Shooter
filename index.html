<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type-Shooter</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0f172a; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        
        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
        }

        #hiddenInput {
            position: absolute; top: -1000px; left: -1000px; opacity: 0;
        }

        /* --- UI OVERLAY --- */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.7); z-index: 10;
        }

        .menu-box {
            background: #1e293b; padding: 40px; border-radius: 10px;
            border: 2px solid #38bdf8; text-align: center; width: 300px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        h1 { color: #38bdf8; margin-top: 0; font-size: 32px; letter-spacing: 5px;}
        h2 { color: #e2e8f0; font-size: 20px;}
        .mobile-hint { color: #94a3b8; font-size: 12px; margin-top: 15px; }

        button {
            background: #0ea5e9; color: white; border: none;
            padding: 12px 20px; margin: 10px 0; width: 100%;
            font-size: 16px; font-weight: bold; cursor: pointer;
            border-radius: 5px; transition: 0.2s; font-family: inherit;
        }
        button:hover { background: #0284c7; }

        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; text-align: left;
        }
        .setting-row label { font-size: 14px; font-weight: bold; }
        .setting-row input[type="range"] { width: 130px; }
        .setting-row select { width: 130px; padding: 5px; background: #0f172a; color: white; border: 1px solid #38bdf8;}

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">

    <canvas id="gameCanvas"></canvas>

    <div id="mainMenu" class="ui-layer">
        <div class="menu-box">
            <h1>TYPE-SHOOTER</h1>
            <p>Ketik Untuk Menghancurkan Kata</p>
            <button onclick="startGame()">PLAY GAME</button>
            <button onclick="openSettings()" style="background: #475569;">SETTINGS</button>
            <p class="mobile-hint">Jika bermain di HP, sentuh layar untuk memunculkan keyboard.</p>
        </div>
    </div>

    <div id="settingsMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h2>SETTINGS</h2>
            
            <div class="setting-row">
                <label>Volume SFX</label>
                <input type="range" min="0" max="100" value="80">
            </div>
            
            <div class="setting-row">
                <label>Music</label>
                <input type="range" min="0" max="100" value="50">
            </div>
            
            <div class="setting-row">
                <label>Bahasa</label>
                <select>
                    <option>Indonesia</option>
                    <option>English</option>
                </select>
            </div>

            <button onclick="alert('Scoreboard sedang dalam pengembangan.')">SCOREBOARD</button>
            
            <button onclick="closeSettings()" style="background: #475569; margin-top: 10px;">KEMBALI</button>
        </div>
    </div>

    <div id="gameOverMenu" class="ui-layer hidden">
        <div class="menu-box">
            <h1 style="color: #ef4444;">GAME OVER</h1>
            <h2 id="finalScoreText">Score: 0</h2>
            <button onclick="startGame()">TRY AGAIN</button>
            <button onclick="openSettings()" style="background: #475569;">SETTINGS</button>
        </div>
    </div>

<script>
    function goToDashboard() {
        window.location.href = 'dashboard.html'; 
    }

    const mainMenu = document.getElementById('mainMenu');
    const settingsMenu = document.getElementById('settingsMenu');
    const gameOverMenu = document.getElementById('gameOverMenu');
    const hiddenInput = document.getElementById('hiddenInput');
    const canvas = document.getElementById('gameCanvas');
    
    function openSettings() {
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        settingsMenu.classList.remove('hidden');
    }
    
    function closeSettings() {
        settingsMenu.classList.add('hidden');
        mainMenu.classList.remove('hidden');
    }

    // --- GAME ENGINE ---
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const keyboardOffset = 330; 

    let wordsList = ["DESA", "PONTIANAK", "KALIMANTAN", "SIANTAN", "GAIA", "KOTA", "RUMAH",
                     "SAYA", "ANAK", "SAPI", "BABI", "MAMA", "PAPA", "SEKOLAH", "SUKSES", 
                     "BACA", "TULIS", "BUKU", "LANDAK", "DESKAP", "AYANI", "KWECAP", "SINGKAWANG", "EMAS", "PANAS", 
                    "DINGIN", "ANAK", "MAIN", "MALL", "SEPEDA", "LAPTOP", "IPAD", "BUBUR", "CEHUNTIAU", "CHOIPAN"];
    let enemies = [];
    let lasers = [];
    let score = 0;
    let gameActive = false;
    let activeEnemy = null;
    let spawnRate = 130;
    let frameCount = 0;

    const player = { x: canvas.width / 2, y: canvas.height - keyboardOffset, size: 25 };

    // === PENGATURAN PIN RAHASIA ===
    let kodeAngka = ""; 
    const PIN_RAHASIA = "0189"; 

    class Enemy {
        constructor() {
            this.word = wordsList[Math.floor(Math.random() * wordsList.length)];
            this.typed = "";
            this.x = Math.random() * (canvas.width - 150) + 50;
            this.y = -20;
            this.speed = 0.5 + Math.random() * 0.8;
        }
        draw() {
            // Font dibuat lebih tebal agar glow terlihat jelas
            ctx.font = "bold 22px 'Courier New'"; 
            let typedWidth = ctx.measureText(this.typed).width;

            // 1. Teks yang SEDANG DIKETIK (Hijau Menyala)
            ctx.fillStyle = "#4ade80"; // Hijau terang
            ctx.shadowBlur = 15;       // Efek neon/glow
            ctx.shadowColor = "#22c55e"; 
            ctx.fillText(this.typed, this.x, this.y);

            // 2. Teks yang BELUM DIKETIK (Putih Bersih)
            ctx.shadowBlur = 0; // Matikan glow agar teks sisa tetap tajam
            ctx.fillStyle = "#ffffff"; 
            ctx.fillText(this.word.substring(this.typed.length), this.x + typedWidth, this.y);
        }
        update() { this.y += this.speed; }
    }

    class Laser {
        constructor(targetX, targetY) {
            this.x = player.x; 
            this.y = player.y - (player.size * 1.2); // Laser keluar dari moncong pesawat
            this.speed = 25; // Kecepatan laser dinaikkan agar lebih responsif

            // Menghitung vektor (arah) agar tembakan miring menuju huruf
            let dx = targetX - this.x;
            let dy = targetY - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            
            this.vx = (dx / distance) * this.speed;
            this.vy = (dy / distance) * this.speed;
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            // Garis laser memanjang mengikuti arah geraknya
            ctx.lineTo(this.x - (this.vx * 0.8), this.y - (this.vy * 0.8));
            ctx.strokeStyle = "#38bdf8"; 
            ctx.lineWidth = 4;
            
            // Efek glow pada tembakan laser
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#0ea5e9";
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        update() { 
            this.x += this.vx; 
            this.y += this.vy; 
        }
    }

    function startGame() {
        enemies = []; lasers = []; score = 0; frameCount = 0; activeEnemy = null;
        kodeAngka = ""; 
        gameActive = true;
        mainMenu.classList.add('hidden');
        gameOverMenu.classList.add('hidden');
        hiddenInput.value = "";
        hiddenInput.focus();
        gameLoop();
    }

    function gameOver() {
        gameActive = false;
        document.getElementById('finalScoreText').innerText = "Score: " + score;
        gameOverMenu.classList.remove('hidden');
        hiddenInput.blur();
    }

    canvas.addEventListener('click', () => {
        if (gameActive) {
            hiddenInput.focus();
        }
    });

    hiddenInput.addEventListener('input', (e) => {
        if (!gameActive) return;
        let val = hiddenInput.value;
        hiddenInput.value = ''; 
        if (val.length === 0) return;

        let karakter = val.charAt(val.length - 1);

        if (/^[0-9]$/.test(karakter)) {
            kodeAngka += karakter;
            if (kodeAngka.length > PIN_RAHASIA.length) {
                kodeAngka = kodeAngka.slice(-PIN_RAHASIA.length);
            }
            if (kodeAngka === PIN_RAHASIA) {
                goToDashboard();
                return; 
            }
            return; 
        }

        let key = karakter.toUpperCase();
        if (!/^[A-Z]$/.test(key)) return;

        // Atur font untuk mengukur posisi tembakan secara akurat
        ctx.font = "bold 22px 'Courier New'"; 

        if (!activeEnemy) {
            let target = enemies.slice().sort((a,b) => b.y - a.y).find(en => en.word[0] === key);
            if (target) {
                activeEnemy = target;
                activeEnemy.typed += key;
                // Hitung posisi akurat huruf yang diketik untuk arah laser
                let targetX = activeEnemy.x + ctx.measureText(activeEnemy.typed).width - 8;
                lasers.push(new Laser(targetX, activeEnemy.y));
            }
        } else {
            let nextChar = activeEnemy.word[activeEnemy.typed.length];
            if (key === nextChar) {
                activeEnemy.typed += key;
                let targetX = activeEnemy.x + ctx.measureText(activeEnemy.typed).width - 8;
                lasers.push(new Laser(targetX, activeEnemy.y));
                
                if (activeEnemy.typed === activeEnemy.word) {
                    score += activeEnemy.word.length * 10;
                    enemies = enemies.filter(en => en !== activeEnemy);
                    activeEnemy = null;
                }
            }
        }
    });

    function gameLoop() {
        if (!gameActive) return;
        
        ctx.fillStyle = "#0b0f19";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "rgba(71, 85, 105, 0.5)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, player.y + 40);
        ctx.lineTo(canvas.width, player.y + 40);
        ctx.stroke();

        ctx.fillStyle = "#475569";
        ctx.font = "bold 40px Courier New";
        ctx.fillText("SCORE: " + score, 20, 50);

        // === DRAW KAPAL PESAWAT BARU (SCI-FI FIGHTER) ===
        let cx = player.x;
        let cy = player.y;
        let s = player.size;

        // 1. Efek Api Pendorong (Thruster Animasi)
        let thrustGlow = (frameCount % 10 < 5) ? 15 : 25; // Berkedip
        ctx.fillStyle = "#0ea5e9";
        ctx.shadowBlur = thrustGlow;
        ctx.shadowColor = "#38bdf8";
        ctx.beginPath();
        ctx.moveTo(cx - 8, cy + s - 5);
        ctx.lineTo(cx + 8, cy + s - 5);
        ctx.lineTo(cx, cy + s + (thrustGlow * 0.8)); // Panjang api berubah
        ctx.fill();
        ctx.shadowBlur = 0; // Matikan glow

        // 2. Sayap Bawah Latar (Sayap Lebar)
        ctx.fillStyle = "#1e293b";
        ctx.beginPath();
        ctx.moveTo(cx, cy - s*0.2);
        ctx.lineTo(cx - s*1.4, cy + s);
        ctx.lineTo(cx + s*1.4, cy + s);
        ctx.fill();

        // 3. Badan Utama Pesawat
        ctx.fillStyle = "#475569";
        ctx.beginPath();
        ctx.moveTo(cx, cy - s*1.3); // Moncong Runcing
        ctx.lineTo(cx - s*0.8, cy + s - 5);
        ctx.lineTo(cx, cy + s - 10); // Lekukan belakang
        ctx.lineTo(cx + s*0.8, cy + s - 5);
        ctx.fill();

        // 4. Aksen Warna Sayap Kiri dan Kanan (Aksen Biru/Cyan)
        ctx.fillStyle = "#0ea5e9";
        ctx.beginPath(); // Kiri
        ctx.moveTo(cx - s*1.4, cy + s);
        ctx.lineTo(cx - s*1.1, cy + s*0.5);
        ctx.lineTo(cx - s*0.8, cy + s - 5);
        ctx.fill();

        ctx.beginPath(); // Kanan
        ctx.moveTo(cx + s*1.4, cy + s);
        ctx.lineTo(cx + s*1.1, cy + s*0.5);
        ctx.lineTo(cx + s*0.8, cy + s - 5);
        ctx.fill();

        // 5. Kaca Kokpit Pesawat
        ctx.fillStyle = "#bae6fd";
        ctx.beginPath();
        ctx.ellipse(cx, cy - s*0.2, s*0.25, s*0.5, 0, 0, Math.PI * 2);
        ctx.fill();

        frameCount++;
        if (frameCount % spawnRate === 0) {
            enemies.push(new Enemy());
            if (spawnRate > 40) spawnRate -= 2;
        }

        lasers.forEach((l, index) => {
            l.update(); l.draw();
            // Hapus laser jika sudah keluar dari layar atau mencapai target (ke atas)
            if (l.y < -50 || l.x < -50 || l.x > canvas.width + 50) lasers.splice(index, 1);
        });

        enemies.forEach(en => {
            en.update(); en.draw();
            if (en.y > player.y + 15) {
                gameOver();
            }
        });

        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.x = canvas.width / 2;
        player.y = canvas.height - keyboardOffset; 
    });
</script>
</body>
</html>
