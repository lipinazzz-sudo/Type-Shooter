<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Invest</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-container: #1e1e1e;
            --text-color: #ffffff;
            --border-color: #333333;
            --input-bg: #2d2d2d;
            --button-color: #dc3545;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-color);
            max-width: 950px;
            margin: 0 auto;
            padding: 15px;
        }

        .container {
            background-color: var(--bg-container);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
        }

        h1 {
            color: var(--text-color);
            text-align: center;
            border-bottom: 2px solid #333333;
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            color: var(--text-color);
            font-size: 14px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 15px;
            background-color: var(--input-bg);
            color: var(--text-color);
        }

        #inputData {
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            resize: vertical;
            height: 180px;
            padding: 10px;
            font-size: 14px;
            letter-spacing: 0.5px;
            line-height: 1.5;
            overflow-y: auto;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button.btn-execute {
            background-color: var(--button-color);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background-color 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.btn-execute:hover {
            background-color: #bd2130;
        }

        .bottom-layout {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .output-container {
            position: relative;
            width: 100%;
        }

        #outputData {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: #ffffff;
            font-weight: bold;
            padding-right: 80px;
            resize: vertical;
            height: 200px;
            font-size: 16px;
            line-height: 1.6;
            overflow-y: auto;
        }

        button.btn-copy {
            position: absolute;
            top: 40px;
            right: 10px;
            background-color: #444444;
            color: white;
            border: 1px solid #555555;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.btn-copy:hover {
            background-color: #555555;
        }

        /* --- BOX PENCOCOK ANGKA --- */
        .match-box {
            background-color: #252525;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            box-sizing: border-box;
            min-height: 320px;
        }

        .match-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Tampilan Kolom Berdampingan untuk Hasil */
        .side-by-side-results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .main-layout {
                display: grid;
                grid-template-columns: 1fr 1.2fr;
                gap: 25px;
            }
            .bottom-layout {
                display: grid;
                grid-template-columns: 1fr 1.3fr;
                gap: 25px;
            }
            #inputData { height: 340px; }
            #outputData { height: 340px; }
            
            .match-layout {
                display: grid;
                grid-template-columns: 1fr 1.2fr;
            }
            button.btn-copy { top: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Kalkulator Invest</h1>

    <div class="main-layout">
        <div>
            <label for="inputData">Data Angka Asli:</label>
            <textarea id="inputData" rows="15" readonly>45.54.68.86.73.37
60.06.23.32.12.21
48.84.26.62.43.34
56.65.04.40.19.91
59.95.07.70.46.64
09.90.15.51.24.42
30.03.57.75.69.96
29.92.13.31.79.97
36.63.08.80.17.71
89.98.38.83.10.01
05.50.74.47.25.52
14.41.49.94.28.82
18.81.58.85.67.76
16.61.78.87.39.93
27.72.35.53.20.02</textarea>
        </div>

        <div>
            <div class="grid-inputs">
                <div>
                    <label for="hapusAwalan">Awalan</label>
                    <input type="text" id="hapusAwalan">
                </div>
                <div>
                    <label for="hapusAkhiran">Akhiran</label>
                    <input type="text" id="hapusAkhiran">
                </div>
            </div>

            <label for="hapusSpesifik" style="margin-top: 20px;">Angka Spesifik</label>
            <input type="text" id="hapusSpesifik">

            <button class="btn-execute" onclick="prosesAngka()">Hasil Akhir</button>
        </div>
    </div>

    <div class="bottom-layout">
        <div>
            <label style="font-size: 16px; margin-bottom: 10px;">Hasil Akhir</label>
            <div class="output-container">
                <textarea id="outputData" readonly></textarea>
                <button class="btn-copy" onclick="copyHasil()" id="btnCopyText">Copy</button>
            </div>
        </div>

        <div>
            <label style="font-size: 16px; margin-bottom: 10px;">Pencocok Angka Mandiri</label>
            <div class="match-box">
                
                <div class="match-layout">
                    <div class="match-input-side">
                        <textarea id="inputPembanding" placeholder="Ketik angka buatan Anda di sini..." style="height: 200px; resize: none;"></textarea>
                        
                        <button class="btn-execute" onclick="cocokkanData()" style="margin-top: 10px; background-color: #2ecc71; font-size: 14px; padding: 12px; letter-spacing: 0;">Cocokkan Data</button>
                    </div>

                    <div class="match-result-side">
                        
                        <div id="wrapperHasilCocok" style="display: none; flex-direction: column; gap: 15px;">
                            
                            <div id="boxDouble" style="display: none;">
                                <label style="color: #3498db; font-size: 12px; margin-bottom: 5px; display: block;">ℹ Angka Double (Terdeteksi Anda mengetik ganda):</label>
                                <textarea id="outputDouble" readonly style="height: 50px; border: 1px solid #3498db; color: #3498db; resize: none; width: 100%; box-sizing: border-box;"></textarea>
                            </div>

                            <div id="pesanCocok" style="display: none; color: #2ecc71; font-weight: bold; text-align: center; margin-top: 10px; font-size: 14px;">
                                ✔ Semua angka terverifikasi cocok.
                            </div>

                            <div id="gridPerbedaan" class="side-by-side-results" style="display: none;">
                                <div style="display: flex; flex-direction: column;">
                                    <label style="color: #e74c3c; font-size: 11px; margin-bottom: 5px;">⚠ Tidak Cocok (Hilang di data Anda):</label>
                                    <textarea id="outputTidakCocok" readonly style="height: 90px; border: 1px solid #e74c3c; color: #e74c3c; resize: none; width: 100%; box-sizing: border-box;"></textarea>
                                </div>

                                <div style="display: flex; flex-direction: column;">
                                    <label style="color: #f39c12; font-size: 11px; margin-bottom: 5px;">⚠ Berlebih (Tidak ada di Hasil Akhir):</label>
                                    <textarea id="outputBerlebih" readonly style="height: 90px; border: 1px solid #f39c12; color: #f39c12; resize: none; width: 100%; box-sizing: border-box;"></textarea>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    // FILTER DATA ASLI
    function bersihkanInput(str) {
        if (!str) return [];
        return str.split('.').map(item => item.trim()).filter(item => item !== '');
    }

    function prosesAngka() {
        const inputStr = document.getElementById('inputData').value;
        const awalanArr = bersihkanInput(document.getElementById('hapusAwalan').value);
        const akhiranArr = bersihkanInput(document.getElementById('hapusAkhiran').value);
        const spesifikArr = bersihkanInput(document.getElementById('hapusSpesifik').value);

        let rawArray = inputStr.replace(/\n/g, '.').split('.');
        let numArray = rawArray.map(n => n.trim()).filter(n => n !== '');

        if (numArray.length === 0) {
            document.getElementById('outputData').value = "";
            return;
        }

        let hasil = [];

        for (let angka of numArray) {
            let harusDihapus = false;

            for (let awalan of awalanArr) {
                if (angka.startsWith(awalan)) {
                    harusDihapus = true;
                    break;
                }
            }

            if (!harusDihapus) {
                for (let akhiran of akhiranArr) {
                    if (angka.endsWith(akhiran)) {
                        harusDihapus = true;
                        break;
                    }
                }
            }

            if (!harusDihapus) {
                if (spesifikArr.includes(angka)) {
                    harusDihapus = true;
                }
            }

            if (!harusDihapus) {
                hasil.push(angka);
            }
        }

        let barisHasil = [];
        for (let i = 0; i < hasil.length; i += 6) {
            barisHasil.push(hasil.slice(i, i + 6).join('.'));
        }

        document.getElementById('outputData').value = barisHasil.join('\n');
        document.getElementById('btnCopyText').innerText = "Copy";
    }

    function copyHasil() {
        const outputTextArea = document.getElementById('outputData');
        if (!outputTextArea.value) return;

        outputTextArea.select();
        outputTextArea.setSelectionRange(0, 99999);

        navigator.clipboard.writeText(outputTextArea.value).then(() => {
            const btnCopy = document.getElementById('btnCopyText');
            btnCopy.innerText = "Copied!";
            setTimeout(() => {
                btnCopy.innerText = "Copy";
            }, 2000);
        });
    }

    // FUNGSI PENCOCOK DATA (GABUNGAN)
    function cocokkanData() {
        const hasilProsesStr = document.getElementById('outputData').value;
        const pembandingStr = document.getElementById('inputPembanding').value;
        
        const wrapper = document.getElementById('wrapperHasilCocok');
        const boxDouble = document.getElementById('boxDouble');
        const outputDouble = document.getElementById('outputDouble');
        const pesanCocok = document.getElementById('pesanCocok');
        const gridPerbedaan = document.getElementById('gridPerbedaan');
        const outputTidakCocok = document.getElementById('outputTidakCocok');
        const outputBerlebih = document.getElementById('outputBerlebih');

        // Reset tampilan
        wrapper.style.display = 'flex';
        boxDouble.style.display = 'none';
        pesanCocok.style.display = 'none';
        gridPerbedaan.style.display = 'none';
        outputDouble.value = '';
        outputTidakCocok.value = '';
        outputBerlebih.value = '';

        if (!hasilProsesStr || !pembandingStr) {
            alert("Mohon pastikan Anda sudah memproses 'Hasil Akhir' dan mengisi angka di kolom pencocok.");
            wrapper.style.display = 'none';
            return;
        }

        // 1. CEK ANGKA DOUBLE (Hanya menuliskan, tidak merubah isi textbox input)
        // Ambil input mentah, pecah jadi array dengan spasi/koma/baris baru/titik
        let rawPembandingArr = pembandingStr.replace(/[\n\s,.]+/g, ' ').split(' ').map(n => n.trim()).filter(Boolean);
        
        let cekSet = new Set();
        let doubleSet = new Set();

        for (let num of rawPembandingArr) {
            if (cekSet.has(num)) {
                doubleSet.add(num);
            } else {
                cekSet.add(num);
            }
        }

        let arrDouble = Array.from(doubleSet);
        if (arrDouble.length > 0) {
            boxDouble.style.display = 'block';
            outputDouble.value = arrDouble.join(' ');
        }

        // 2. PROSES PENCOCOKAN UTAMA
        let hasilArr = hasilProsesStr.replace(/[\n\s,.]+/g, ' ').split(' ').map(n => n.trim()).filter(Boolean);
        // Menggunakan array unik (tanpa double) untuk menghindari error logika pencocokan
        let pembandingUnikArr = Array.from(cekSet); 

        // Cari angka yang berbeda
        let tidakDitemukan = hasilArr.filter(angka => !pembandingUnikArr.includes(angka));
        let angkaBerlebih = pembandingUnikArr.filter(angka => !hasilArr.includes(angka));

        if (tidakDitemukan.length === 0 && angkaBerlebih.length === 0) {
            pesanCocok.style.display = 'block';
        } else {
            gridPerbedaan.style.display = 'grid'; // Memunculkan kotak merah & kuning secara berdampingan
            
            if (tidakDitemukan.length > 0) {
                outputTidakCocok.value = tidakDitemukan.join(' ');
            } else {
                outputTidakCocok.value = "-";
            }

            if (angkaBerlebih.length > 0) {
                outputBerlebih.value = angkaBerlebih.join(' ');
            } else {
                outputBerlebih.value = "-";
            }
        }
    }
</script>

</body>
